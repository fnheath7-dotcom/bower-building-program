<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Battle Gym App</title>

<link rel="manifest" id="manifestPlaceholder">

<style>
body {
    margin: 0;
    font-family: Arial;
    color: #f1f5f9;
    background: radial-gradient(circle at top, #1a0000, #000000 60%);
    overflow-x: hidden;
}

/* SIDE VISUALS */
.side {
    position: fixed;
    width: 160px;
    opacity: 0.1;
    filter: drop-shadow(0 0 10px red);
}
.left { left: 10px; top: 20%; }
.right { right: 10px; top: 20%; }

/* HEADER */
header {
    text-align: center;
    padding: 20px;
    font-size: 30px;
    font-weight: 900;
    color: #ff2b2b;
}

/* TABS */
.tabs {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    background: rgba(30,0,0,0.6);
    position: sticky;
    top: 0;
}
.tab {
    padding: 12px;
    cursor: pointer;
    background: transparent;
    border: none;
    color: white;
    font-weight: bold;
}
.tab.active {
    color: red;
    border-bottom: 3px solid red;
}

/* CONTENT */
.content { max-width: 900px; margin: auto; padding: 10px; }
.week { display: none; }
.week.active { display: block; }

.day {
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(255,0,0,0.2);
    margin: 10px 0;
    padding: 12px;
    border-radius: 10px;
}

h3 { color: #ff3b3b; }

label { display:block; margin:5px 0; }

/* PR + METER */
.pr-box {
    background: rgba(255,0,0,0.05);
    border: 1px solid red;
    padding: 10px;
    margin-top: 10px;
}

meter {
    width: 100%;
    height: 20px;
}

/* LEADERBOARD */
.board {
    margin-top: 10px;
    background: rgba(255,0,0,0.05);
    border: 1px solid red;
    padding: 10px;
}

/* BUTTON */
button.save {
    margin-top: 5px;
    background: red;
    color: white;
    border: none;
    padding: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<img class="side left" src="https://img.icons8.com/ios-filled/500/barbell.png">
<img class="side right" src="https://img.icons8.com/ios-filled/500/dumbbell.png">

<header>🔥 BATTLE GYM APP</header>

<div class="tabs">
<button class="tab active" onclick="showWeek(1)">W1</button>
<button class="tab" onclick="showWeek(2)">W2</button>
<button class="tab" onclick="showWeek(3)">W3</button>
<button class="tab" onclick="showWeek(4)">W4</button>
<button class="tab" onclick="showWeek(5)">W5</button>
<button class="tab" onclick="showWeek(6)">W6</button>
</div>

<div class="content">

<!-- WEEK 1 -->
<div id="week1" class="week active">

<div class="day">
<h3>MON – BENCH</h3>
<label><input type="checkbox" onclick="tick()"> Bench 5x3</label>
<label><input type="checkbox" onclick="tick()"> Incline DB</label>
<label><input type="checkbox" onclick="tick()"> Fly</label>
<label><input type="checkbox" onclick="tick()"> Pushdown</label>
</div>

<div class="pr-box">
<h3>PR TRACKER</h3>
Bench <input id="b" type="number" oninput="update()"><br>
Squat <input id="s" type="number" oninput="update()"><br>
Deadlift <input id="d" type="number" oninput="update()"><br>

<h3>STRENGTH METER</h3>
<meter id="meter" min="0" max="1500" value="0"></meter>

<button class="save" onclick="savePR()">SAVE PRs</button>
</div>

<div class="board">
<h3>LEADERBOARD (LOCAL)</h3>
<input id="name" placeholder="name">
<button class="save" onclick="saveBoard()">Save Score</button>
<div id="list"></div>
</div>

</div>

<!-- other weeks simplified but still active -->
<div id="week2" class="week"><div class="day"><h3>WEEK 2 FULL PROGRAM</h3>Same structure + progression</div></div>
<div id="week3" class="week"><div class="day"><h3>WEEK 3 INTENSITY</h3>Singles + 80%</div></div>
<div id="week4" class="week"><div class="day"><h3>WEEK 4 OVERLOAD</h3>Heavy doubles</div></div>
<div id="week5" class="week"><div class="day"><h3>WEEK 5 PEAK</h3>PR attempts</div></div>
<div id="week6" class="week"><div class="day"><h3>WEEK 6 RESET</h3>Recovery</div></div>

</div>

<script>

/* ===== TABS ===== */
function showWeek(n){
let w=document.querySelectorAll(".week");
let t=document.querySelectorAll(".tab");
w.forEach(x=>x.classList.remove("active"));
t.forEach(x=>x.classList.remove("active"));
document.getElementById("week"+n).classList.add("active");
t[n-1].classList.add("active");
}

/* ===== SOUND ===== */
function tick(){
let ctx=new AudioContext();
let o=ctx.createOscillator();
o.frequency.value=600;
o.connect(ctx.destination);
o.start();
o.stop(ctx.currentTime+0.1);
}

/* ===== PR + METER ===== */
function update(){
let b=+document.getElementById("b").value||0;
let s=+document.getElementById("s").value||0;
let d=+document.getElementById("d").value||0;
let total=b+s+d;
document.getElementById("meter").value=total;
}

/* SAVE PR */
function savePR(){
localStorage.setItem("pr",JSON.stringify({
b:document.getElementById("b").value,
s:document.getElementById("s").value,
d:document.getElementById("d").value
}));
}

/* LOAD */
window.onload=()=>{
let data=JSON.parse(localStorage.getItem("pr"));
if(data){
document.getElementById("b").value=data.b;
document.getElementById("s").value=data.s;
document.getElementById("d").value=data.d;
update();
}
loadBoard();
}

/* LEADERBOARD */
function saveBoard(){
let name=document.getElementById("name").value;
let pr=+document.getElementById("b").value+
+document.getElementById("s").value+
+document.getElementById("d").value;

let board=JSON.parse(localStorage.getItem("board")||"[]");
board.push({name,pr});
localStorage.setItem("board",JSON.stringify(board));
loadBoard();
}

function loadBoard(){
let board=JSON.parse(localStorage.getItem("board")||"[]");
board.sort((a,b)=>b.pr-a.pr);
document.getElementById("list").innerHTML=
board.map(x=>`<div>${x.name} - ${x.pr}</div>`).join("");
}

/* ===== PWA (INSTALLABLE APP) ===== */
const manifest = {
name:"Battle Gym App",
short_name:"GymApp",
start_url:".",
display:"standalone",
background_color:"#000000",
theme_color:"#ff0000"
};

const blob = new Blob([JSON.stringify(manifest)], {type:"application/json"});
document.getElementById("manifestPlaceholder").href = URL.createObjectURL(blob);

/* service worker */
if('serviceWorker' in navigator){
const sw = `
self.addEventListener('install',e=>self.skipWaiting());
self.addEventListener('fetch',e=>{});
`;
const swBlob = new Blob([sw],{type:"text/javascript"});
navigator.serviceWorker.register(URL.createObjectURL(swBlob));
}

</script>

</body>
</html>
