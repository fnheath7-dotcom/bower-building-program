<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRO GYM RPG APP</title>

<style>
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle,#1a0000,#000);
color:white;
}

header{
text-align:center;
padding:15px;
font-size:28px;
font-weight:bold;
color:#ff2b2b;
}

/* XP BAR */
.xpBox{
position:sticky;
top:0;
background:#000;
padding:10px;
border-bottom:1px solid red;
z-index:10;
}

.bar{
width:100%;
height:12px;
background:#222;
}
.fill{
height:100%;
width:0%;
background:red;
transition:0.3s;
}

/* TABS */
.tabs{
display:flex;
flex-wrap:wrap;
justify-content:center;
background:#111;
position:sticky;
top:55px;
}

.tab{
padding:10px;
border:none;
background:none;
color:white;
cursor:pointer;
}

.tab.active{
color:red;
border-bottom:2px solid red;
}

/* WEEK */
.week{
display:none;
max-width:900px;
margin:auto;
padding:10px;
}

.week.active{display:block;}

.day{
background:#111;
border-left:3px solid red;
padding:10px;
margin:10px 0;
cursor:pointer;
transition:0.2s;
}

.day.done{
opacity:0.5;
text-decoration:line-through;
}

.quote{
color:#ff7777;
font-style:italic;
margin:10px 0;
}

/* PR BOX */
.prBox{
background:#111;
padding:10px;
margin:10px;
border:1px solid red;
}
button{
background:red;
color:white;
border:none;
padding:8px;
cursor:pointer;
margin:5px;
}
</style>
</head>

<body>

<header>🔥 PRO GYM RPG APP</header>

<div class="xpBox">
LEVEL: <span id="lvl">1</span> |
XP: <span id="xp">0</span>/100 |
STREAK: <span id="streak">0</span>
<div class="bar"><div class="fill" id="fill"></div></div>
</div>

<div class="prBox">
<h3>PR Tracker</h3>
<button onclick="setPR()">Set PRs</button>
<div id="prDisplay"></div>
</div>

<div class="tabs">
<button class="tab active" onclick="show(1)">W1</button>
<button class="tab" onclick="show(2)">W2</button>
<button class="tab" onclick="show(3)">W3</button>
<button class="tab" onclick="show(4)">W4</button>
<button class="tab" onclick="show(5)">W5</button>
<button class="tab" onclick="show(6)">W6</button>
</div>

<!-- ================= WEEK 1 ================= -->
<div id="w1" class="week active">
<div class="quote">Discipline beats motivation.</div>

<div class="day" onclick="complete(this)">DAY 1 – Bench Heavy</div>
<div class="day" onclick="complete(this)">DAY 2 – Squat</div>
<div class="day" onclick="complete(this)">DAY 3 – Back</div>
<div class="day" onclick="complete(this)">DAY 4 – Deadlift</div>
<div class="day" onclick="complete(this)">DAY 5 – Arms</div>
</div>

<div id="w2" class="week"><div class="day" onclick="complete(this)">Week 2 Progression</div></div>
<div id="w3" class="week"><div class="day" onclick="complete(this)">Week 3 Intensity</div></div>
<div id="w4" class="week"><div class="day" onclick="complete(this)">Week 4 Overload</div></div>
<div id="w5" class="week"><div class="day" onclick="complete(this)">Week 5 Peak</div></div>
<div id="w6" class="week"><div class="day" onclick="complete(this)">Week 6 Reset</div></div>

<script>

let xp = 0;
let lvl = 1;
let streak = 0;
let lastDay = null;

/* ================= COMPLETE WORKOUT ================= */
function complete(el){

if(el.classList.contains("done")) return;

el.classList.add("done");

xp += 20;

/* streak system */
let today = new Date().toDateString();
if(lastDay !== today){
streak++;
lastDay = today;
}

/* level up */
if(xp >= 100){
xp = 0;
lvl++;
alert("LEVEL UP!");
}

save();
update();
}

/* ================= UPDATE UI ================= */
function update(){
document.getElementById("xp").innerText = xp;
document.getElementById("lvl").innerText = lvl;
document.getElementById("streak").innerText = streak;
document.getElementById("fill").style.width = xp + "%";
}

/* ================= TABS ================= */
function show(n){
let weeks = document.querySelectorAll(".week");
let tabs = document.querySelectorAll(".tab");

weeks.forEach(w => w.classList.remove("active"));
tabs.forEach(t => t.classList.remove("active"));

document.getElementById("w"+n).classList.add("active");
tabs[n-1].classList.add("active");
}

/* ================= PR SYSTEM ================= */
function setPR(){
let b = prompt("Bench PR?");
let s = prompt("Squat PR?");
let d = prompt("Deadlift PR?");

let data = {b,s,d};
localStorage.setItem("prs", JSON.stringify(data));

displayPR();
}

function displayPR(){
let data = JSON.parse(localStorage.getItem("prs"));
if(!data) return;

document.getElementById("prDisplay").innerHTML =
"Bench: " + data.b + "<br>" +
"Squat: " + data.s + "<br>" +
"Deadlift: " + data.d;
}

/* ================= SAVE SYSTEM ================= */
function save(){
localStorage.setItem("gymApp", JSON.stringify({
xp,lvl,streak
}));
}

/* ================= LOAD ================= */
window.onload = () => {
let data = JSON.parse(localStorage.getItem("gymApp"));

if(data){
xp = data.xp;
lvl = data.lvl;
streak = data.streak;
}

update();
displayPR();
};

</script>

</body>
</html>
